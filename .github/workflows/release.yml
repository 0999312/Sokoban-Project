name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.2"
  EXPORT_TEMPLATE_VERSION: "4.6.2.stable"
  EXPORT_NAME: "Sokoban"

jobs:
  test:
    name: Run Headless Tests
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup godot-ci
        run: |
          apt-get update
          apt-get install -y --no-install-recommends libfontconfig1
          mkdir -p "$HOME/.config" "$HOME/.local/share/godot/export_templates"
          if [ -d /root/.config/godot ] && [ "$HOME" != "/root" ] && [ ! -e "$HOME/.config/godot" ]; then
            cp -a /root/.config/godot "$HOME/.config/godot"
          fi
          if [ -d "/root/.local/share/godot/export_templates/${{ env.EXPORT_TEMPLATE_VERSION }}" ] && [ "$HOME" != "/root" ] && [ ! -e "$HOME/.local/share/godot/export_templates/${{ env.EXPORT_TEMPLATE_VERSION }}" ]; then
            cp -a "/root/.local/share/godot/export_templates/${{ env.EXPORT_TEMPLATE_VERSION }}" "$HOME/.local/share/godot/export_templates/${{ env.EXPORT_TEMPLATE_VERSION }}"
          fi
          godot --version

      - name: Import project
        run: godot --headless --editor --quit --path .

      - name: Smoke Tests
        run: godot --headless --path . --script res://tests/smoke_test.gd

      - name: Solver Tests
        run: godot --headless --path . --script res://tests/solver_test.gd

      - name: Editor Tests
        run: godot --headless --path . --script res://tests/editor_test.gd

  export:
    name: Export ${{ matrix.name }}
    needs: test
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.2
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            preset: "Windows Desktop"
            export_dir: windows
            export_path: "Sokoban.exe"
            asset_name: "Sokoban-windows-x86_64.exe"

          - name: Linux
            preset: "Linux"
            export_dir: linux
            export_path: "Sokoban.x86_64"
            asset_name: "Sokoban-linux-x86_64"

          - name: macOS
            preset: "macOS"
            export_dir: macos
            export_path: "Sokoban-macos.zip"
            asset_name: "Sokoban-macos-x86_64.zip"

          - name: Web
            preset: "Web"
            export_dir: web
            export_path: "index.html"
            asset_name: "Sokoban-web.zip"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup godot-ci
        run: |
          apt-get update
          apt-get install -y --no-install-recommends libfontconfig1
          mkdir -p "$HOME/.config" "$HOME/.local/share/godot/export_templates"
          if [ -d /root/.config/godot ] && [ "$HOME" != "/root" ] && [ ! -e "$HOME/.config/godot" ]; then
            cp -a /root/.config/godot "$HOME/.config/godot"
          fi
          if [ -d "/root/.local/share/godot/export_templates/${{ env.EXPORT_TEMPLATE_VERSION }}" ] && [ "$HOME" != "/root" ] && [ ! -e "$HOME/.local/share/godot/export_templates/${{ env.EXPORT_TEMPLATE_VERSION }}" ]; then
            cp -a "/root/.local/share/godot/export_templates/${{ env.EXPORT_TEMPLATE_VERSION }}" "$HOME/.local/share/godot/export_templates/${{ env.EXPORT_TEMPLATE_VERSION }}"
          fi
          godot --version

      - name: Import project
        run: godot --headless --editor --quit --path .

      - name: Export ${{ matrix.name }}
        run: |
          mkdir -p "build/${{ matrix.export_dir }}"
          EXPORT_DIR="$(readlink -f build)"
          godot --headless --verbose --path . --export-release "${{ matrix.preset }}" "$EXPORT_DIR/${{ matrix.export_dir }}/${{ matrix.export_path }}"

      - name: Package ${{ matrix.name }}
        run: |
          case "${{ matrix.preset }}" in
            "Web")
              (
                cd "build/${{ matrix.export_dir }}"
                zip -r "../${{ matrix.asset_name }}" .
              )
              ;;
            *)
              cp "build/${{ matrix.export_dir }}/${{ matrix.export_path }}" "build/${{ matrix.asset_name }}"
              ;;
          esac

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: build/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: export
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate Release Notes
        id: notes
        run: |
          {
            echo 'release_body<<EOF'
            echo "## Sokoban Project ${{ github.ref_name }}"
            echo ""
            echo "### Downloads"
            echo ""
            for f in artifacts/*; do
              if [ -f "$f" ]; then
                name=$(basename "$f")
                size=$(du -h "$f" | cut -f1)
                echo "- \`$name\` ($size)"
              fi
            done
            echo ""
            echo "### Changes"
            echo ""
            prev=$(git rev-list --tags --max-count=1 2>/dev/null || echo "")
            if [ -n "$prev" ]; then
              git log --oneline "$prev..HEAD" 2>/dev/null | sed 's/^/- /' || true
            else
              git log --oneline -20 2>/dev/null | sed 's/^/- /' || true
            fi
            echo ""
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Sokoban Project ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.release_body }}
          files: artifacts/*
          fail_on_unmatched_files: true
